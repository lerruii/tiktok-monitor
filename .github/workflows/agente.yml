name: Agente TikTok

on:
  schedule:
    # 14:00 UTC = 09:00 Colombia/Perú/Ecuador (UTC-5)
    - cron: "0 14 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "data/stories.json"

permissions:
  contents: write

concurrency:
  group: agente-tiktok
  cancel-in-progress: false

jobs:
  actualizar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Correr agente
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/agente.mjs

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json public/data.js
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "chore: actualizar estadísticas de TikTok [bot]"
            git push
          fi
